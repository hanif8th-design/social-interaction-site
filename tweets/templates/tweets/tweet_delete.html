{% extends "base.html" %}
{% load static %}

{% block title %}Delete Tweet | {{ block.super }}{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm">
        <div class="card-body text-center">
            <h4 class="card-title mb-4">Delete Tweet</h4>
            <p>Are you sure you want to delete this tweet?</p>
            <blockquote class="blockquote text-muted">
                "{{ object.content }}"
            </blockquote>

            <!-- Delete Form -->
            <form method="POST" class="d-flex justify-content-center gap-2 mt-3">
                {% csrf_token %}
                <a href="{% url 'tweets:my_tweets' %}" class="btn btn-secondary">
                    Cancel
                </a>
                <button type="submit" class="btn btn-danger">
                    Delete
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
