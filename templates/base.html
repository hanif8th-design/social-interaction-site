{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} RAKSA {% endblock title %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'main_static/main.css' %}">
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- LEFT SIDEBAR COMPONENT -->
        <div class="col-md-3 p-0">
            {% include "components/sidebar.html" %}
        </div>

        <!-- CENTER CONTENT -->
        <div class="col-md-6 feed p-4">
            <section>
            {% block content %}
                
            {% endblock %}
            </section>
        </div>

        <!-- RIGHT SIDEBAR COMPONENT -->
        <div class="col-md-3 p-0">
            {% include "components/right_sidebar.html" %}
        </div>

    </div>

    {% include "components/footer.html" %}
</div>

{% block page_js %}
{% endblock page_js %}

</body>
</html>
