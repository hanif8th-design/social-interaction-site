{% extends "base.html" %}
{% block title %}Change password | {{block.super}}{% endblock title %}
{% load crispy_forms_tags %}


{% block content %}
<form action="{% url "accounts:password-change" %}" method = 'POST'>
    {% csrf_token %}
    {{form|crispy}}
    <button type="submit" class = "btn btn-info">Change Password</button>    
</form>


{% endblock content %}
