{% extends "registration/auth_base.html" %}
{% load static %}
{% load crispy_forms_tags %}


{% block content %}
   

<div class="card-box">
    <h2>SIGN UP RAKSA </h2>

    <form method="POST">
        {% csrf_token %}

        {{form|crispy}}
        <button type="submit" class="btn btn-main w-100">Create Account</button>
    </form>

    <div class="links">
        <p>Already have an account? <a href="{% url "accounts:login" %}">Login</a></p>
    </div>
</div>




{% endblock content %}
