<!-- RIGHT SIDEBAR (STATIC) -->
<div class="col-md-3 right-sidebar p-4">

    <h5>People To Follow</h5>

    {% for member in  members_to_follow%}
    <div class="follow-box d-flex justify-content-between align-items-center mt-3">
        <div class="d-flex align-items-center">
            <img src="{{member.profile_picture_url}}" class="rounded-circle me-2" width="40" height="40">
            {% if member.full_name %}
            <span class="fw-bold">{{ member.full_name }}</span>
            
            {% else %}
        <!-- Username smaller below -->
             <small class="text-muted">{{ member.user.username }}</small>
            {% endif %}
        </div>
        <form action="{% url "accounts:follow" member.pk%}" method = 'post'>
            {% csrf_token %}
            <button class="btn btn-sm btn-primary follow-btn" type = "submit" >Follow</button>
        </form>
    </div>  
    {% endfor %}

    

  

</div>
